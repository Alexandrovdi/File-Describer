name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Create Release
        id: create_release
        run: |
          response=$(curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/releases" \
            -H "Authorization: token ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${{ github.ref_name }}\",\"name\":\"${{ github.ref_name }}\",\"body\":\"Release ${{ github.ref_name }}\"}")
          echo "$response"
          if echo "$response" | grep -q '"id"'; then
            release_id=$(echo "$response" | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')
            echo "release_id=$release_id" >> $GITHUB_OUTPUT
          else
            echo "Failed to create release"
            exit 1
          fi
      - name: Upload Release Assets
        run: |
          for file in main.js manifest.json styles.css; do
            echo "Uploading $file..."
            curl -s -X POST "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=$file" \
              -H "Authorization: token ${{ github.token }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$file"
          done
