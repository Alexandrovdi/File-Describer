name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "main.js,manifest.json,styles.css"
          body: "Release ${{ github.ref_name }}"
          name: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          token: ${{ github.token }}
