name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Create Release
        id: create_release
        run: |
          curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/releases" \
            -H "Authorization: token ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg tag "${{ github.ref_name }}" '{
              tag_name: $tag,
              name: $tag,
              body: ("Release " + $tag)
            }')" > release_response.json
          cat release_response.json
          echo "release_id=$(jq -r '.id' release_response.json)" >> $GITHUB_OUTPUT
      - name: Upload Release Assets
        run: |
          for file in main.js manifest.json styles.css; do
            echo "Uploading $file..."
            curl -s -X POST "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=$file" \
              -H "Authorization: token ${{ github.token }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$file"
          done
